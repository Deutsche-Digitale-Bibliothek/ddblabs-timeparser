name: Build and Publish

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: ./mvnw --batch-mode verify

  publish-snapshot:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: maven-central
    env:
      CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
      CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java for SNAPSHOT publishing
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD

      - name: Detect project version
        id: version
        run: echo "value=$(./mvnw --batch-mode -q -DforceStdout help:evaluate -Dexpression=project.version)" >> "$GITHUB_OUTPUT"

      - name: Publish SNAPSHOT to Maven Central
        if: endsWith(steps.version.outputs.value, '-SNAPSHOT')
        run: ./mvnw --batch-mode -P central-snapshot deploy

  publish:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: maven-central
    env:
      CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
      CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java for publishing
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Ensure release version is not a SNAPSHOT
        run: |
          VERSION=$(./mvnw --batch-mode -q -DforceStdout help:evaluate -Dexpression=project.version)
          if [[ "$VERSION" == *-SNAPSHOT ]]; then
            echo "Release publishing requires a non-SNAPSHOT version, current version is $VERSION"
            exit 1
          fi

      - name: Publish to Maven Central
        run: ./mvnw --batch-mode -P release deploy

  pages:
    if: github.event_name == 'release'
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: github-pages

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Generate JavaDocs
        run: ./mvnw --batch-mode javadoc:javadoc

      - name: Publish JavaDocs to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/site/apidocs
          force_orphan: true